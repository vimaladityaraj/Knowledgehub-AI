version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# KnowledgeHub AI – Docker Compose
# Runs the FastAPI backend and Streamlit frontend as separate services.
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data          # persist uploads and ChromaDB
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Streamlit frontend ──────────────────────────────────────────────────────
  frontend:
    build: .
    command: >
      streamlit run frontend/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - STREAMLIT_API_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
